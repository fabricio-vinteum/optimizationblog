let filter='all',editorFilter='',searchQ='',sortCol='title',sortDir=1;

function counts(){
  const t=posts.length,f=posts.filter(p=>p.faq).length,c=posts.filter(p=>p.toc).length,
    b=posts.filter(p=>p.faq&&p.toc).length,mb=posts.filter(p=>!p.faq&&!p.toc).length,
    eg=posts.filter(p=>p.editor==='Gutenberg').length,
    ec=posts.filter(p=>p.editor==='Classic').length,
    ee=posts.filter(p=>p.editor==='Elementor').length;
  return {t,f,c,b,mb,mf:t-f,mt:t-c,eg,ec,ee};
}

function renderStats(){
  const s=counts();
  document.getElementById('stats').innerHTML=`
    <div class="stat-card total"><div class="label">Total Posts</div><div class="value">${s.t}</div><div class="sub">posts publicados</div></div>
    <div class="stat-card ok"><div class="label">Completos</div><div class="value">${s.b}</div><div class="sub">FAQ + TOC presentes</div></div>
    <div class="stat-card warn"><div class="label">Falta FAQ</div><div class="value">${s.mf}</div><div class="sub">${(s.mf/s.t*100).toFixed(0)}% dos posts</div></div>
    <div class="stat-card warn"><div class="label">Falta TOC</div><div class="value">${s.mt}</div><div class="sub">${(s.mt/s.t*100).toFixed(0)}% dos posts</div></div>
    <div class="stat-card danger"><div class="label">Faltam Ambos</div><div class="value">${s.mb}</div><div class="sub">${(s.mb/s.t*100).toFixed(0)}% dos posts</div></div>
    <div class="stat-card info"><div class="label">Gutenberg</div><div class="value">${s.eg}</div><div class="sub">${(s.eg/s.t*100).toFixed(0)}% dos posts</div></div>
    <div class="stat-card" style=""><div class="label">Classic Editor</div><div class="value" style="color:#fbbf24">${s.ec}</div><div class="sub">${(s.ec/s.t*100).toFixed(0)}% dos posts</div></div>`;
}

function drawDonut(id,segments){
  const c=document.getElementById(id),ctx=c.getContext('2d');
  const dpr=window.devicePixelRatio||1;c.width=150*dpr;c.height=150*dpr;ctx.scale(dpr,dpr);
  const cx=75,cy=75,r=58,lw=18,total=segments.reduce((a,s)=>a+s.val,0);
  let start=-Math.PI/2;
  segments.forEach(s=>{
    const a=s.val/total*Math.PI*2;
    if(a>0){ctx.beginPath();ctx.arc(cx,cy,r,start,start+a);ctx.strokeStyle=s.color;ctx.lineWidth=lw;ctx.lineCap='butt';ctx.stroke();start+=a;}
  });
}

function renderCharts(){
  const s=counts();
  drawDonut('faqDonut',[{val:s.f,color:'#34d399'},{val:s.mf,color:'#f87171'}]);
  document.getElementById('faqPct').textContent=((s.f/s.t)*100).toFixed(0)+'%';
  document.getElementById('faqLegend').innerHTML=`
    <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div>Com FAQ (${s.f})</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div>Sem FAQ (${s.mf})</div>`;
  drawDonut('tocDonut',[{val:s.c,color:'#34d399'},{val:s.mt,color:'#f87171'}]);
  document.getElementById('tocPct').textContent=((s.c/s.t)*100).toFixed(0)+'%';
  document.getElementById('tocLegend').innerHTML=`
    <div class="legend-item"><div class="legend-dot" style="background:#34d399"></div>Com TOC (${s.c})</div>
    <div class="legend-item"><div class="legend-dot" style="background:#f87171"></div>Sem TOC (${s.mt})</div>`;
  drawDonut('editorDonut',[{val:s.eg,color:'#60a5fa'},{val:s.ec,color:'#fbbf24'},{val:s.ee,color:'#a78bfa'}]);
  document.getElementById('editorPct').textContent=s.t;
  document.getElementById('editorLegend').innerHTML=`
    <div class="legend-item"><div class="legend-dot" style="background:#60a5fa"></div>Gutenberg (${s.eg})</div>
    <div class="legend-item"><div class="legend-dot" style="background:#fbbf24"></div>Classic (${s.ec})</div>
    <div class="legend-item"><div class="legend-dot" style="background:#a78bfa"></div>Elementor (${s.ee})</div>`;
}

function renderBarChart(){
  const cats={};
  posts.forEach(p=>{
    if(!cats[p.category])cats[p.category]={total:0,both:0};
    cats[p.category].total++;if(p.faq&&p.toc)cats[p.category].both++;
  });
  const sorted=Object.entries(cats).sort((a,b)=>b[1].total-a[1].total);
  const maxT=Math.max(...sorted.map(s=>s[1].total));
  document.getElementById('barChart').innerHTML=sorted.map(([cat,d])=>{
    const hp=(d.both/maxT*100).toFixed(1),mp=((d.total-d.both)/maxT*100).toFixed(1);
    return `<div class="bar-row"><div class="bar-label">${cat.replace(/-/g,' ')}</div><div class="bar-track"><div class="bar-fill has" style="width:${hp}%"></div><div class="bar-fill miss" style="width:${mp}%"></div></div><div class="bar-count">${d.both}/${d.total}</div></div>`;
  }).join('');
}

function getFiltered(){
  let f=posts;
  if(filter==='missing-both')f=f.filter(p=>!p.faq&&!p.toc);
  else if(filter==='missing-faq')f=f.filter(p=>!p.faq);
  else if(filter==='missing-toc')f=f.filter(p=>!p.toc);
  else if(filter==='ok')f=f.filter(p=>p.faq&&p.toc);
  if(editorFilter)f=f.filter(p=>p.editor.toLowerCase()===editorFilter);
  if(searchQ)f=f.filter(p=>p.title.toLowerCase().includes(searchQ));
  f.sort((a,b)=>{
    let va=a[sortCol],vb=b[sortCol];
    if(typeof va==='boolean'){va=va?1:0;vb=vb?1:0;}
    if(typeof va==='string')return va.localeCompare(vb)*sortDir;
    return (va-vb)*sortDir;
  });
  return f;
}

function renderTable(){
  const f=getFiltered();
  document.getElementById('countInfo').textContent=`Mostrando ${f.length} de ${posts.length} posts`;
  document.getElementById('tbody').innerHTML=f.map(p=>`<tr>
    <td>${p.title}</td>
    <td><span class="cat-badge">${p.category.replace(/-/g,' ')}</span></td>
    <td><span class="editor-badge ${p.editor.toLowerCase()}">${p.editor}</span></td>
    <td><span class="badge ${p.faq?'yes':'no'}">${p.faq?'\u2705 Sim':'\u274C Nao'}</span></td>
    <td><span class="badge ${p.toc?'yes':'no'}">${p.toc?'\u2705 Sim':'\u274C Nao'}</span></td>
    <td><a href="${p.link}" target="_blank">Abrir</a></td>
  </tr>`).join('');
}

function sortBy(col){if(sortCol===col)sortDir*=-1;else{sortCol=col;sortDir=1;}renderTable();}

document.querySelectorAll('.filter-btn:not(.editor-btn)').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn:not(.editor-btn)').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');filter=btn.dataset.filter;renderTable();
  });
});
document.querySelectorAll('.filter-btn.editor-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    if(btn.classList.contains('active')){btn.classList.remove('active');editorFilter='';}
    else{document.querySelectorAll('.filter-btn.editor-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');editorFilter=btn.dataset.filter;}
    renderTable();
  });
});
document.getElementById('search').addEventListener('input',e=>{searchQ=e.target.value.toLowerCase();renderTable();});

function exportCSV(){
  const f=getFiltered();
  let csv='Titulo,Categoria,Editor,FAQ,TOC,Link\n';
  f.forEach(p=>{csv+=`"${p.title.replace(/"/g,'""')}",${p.category},${p.editor},${p.faq?'Sim':'Nao'},${p.toc?'Sim':'Nao'},${p.link}\n`;});
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='schema_analysis.csv';a.click();
}

renderStats();renderCharts();renderBarChart();renderTable();
</script>
